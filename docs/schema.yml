version: "1.0"
framework: diataxis
delivery_target: "static-docs-site"
default_language: "es"
language_rules:
  - "Toda la documentación generada, actualizada o reescrita debe estar en español."
  - "Los títulos, descripciones, encabezados, índices y contenido explicativo deben redactarse en español."
  - "Los nombres de archivos y rutas deben permanecer en kebab-case técnico y estable, aunque el contenido humano esté en español."
  - "Los identificadores de código, nombres de clases, funciones, parámetros y tipos deben conservar su nombre original."
  - "Si una fuente está en inglés, debe resumirse o explicarse en español sin traducir incorrectamente los términos técnicos necesarios."
site_generators:
  primary: "docusaurus"
  compatible_with:
    - "mkdocs"
    - "vitepress"
    - "astro-starlight"

site_conventions:
  output_format: "markdown-with-frontmatter"
  require_frontmatter: true
  frontmatter_fields:
    - "title"
    - "description"
    - "sidebar_position"
  optional_frontmatter_fields:
    - "slug"
    - "tags"
    - "sidebar_label"
  landing_pages:
    - "Cada sección principal debe tener un index.md o README.md navegable"
    - "Cada carpeta con hijos debe funcionar como categoría del sitio"
  navigation_rules:
    - "Los documentos deben poder aparecer ordenados en sidebar sin edición manual extensa"
    - "Usar nombres de carpetas estables, semánticos y compatibles con URLs"
    - "Evitar nombres ambiguos o dependientes de contexto temporal"
    - "Debe existir una home global de docs y un index o README por cada carpeta navegable"
  file_rules:
    - "Preferir index.md para páginas landing de carpeta"
    - "Usar kebab-case en nombres de archivo y carpetas"
    - "Evitar espacios, mayúsculas y caracteres especiales en rutas"
  link_rules:
    - "Usar enlaces relativos entre documentos markdown"
    - "Todo archivo creado debe ser enlazable desde al menos una página índice"
    - "No crear páginas huérfanas"

audiences:
  dev:
    path: docs/dev/
    profile: "Desarrollador. Busca precisión técnica. Consulta puntualmente."
    sections:
      tutorials:  "Guía de inicio guiado. El lector nunca ha tocado el proyecto."
      how-to:     "Tareas específicas. Asume conocimiento base. Directo al punto."
      reference:  "Firmas, parámetros, tipos, errores. Se consulta, no se lee."
      explanation: "Decisiones de arquitectura y contexto del por qué."
    symbol_policy:
      public:
        definition:
          - "Se considera público todo símbolo destinado a ser consumido por otros módulos, por integraciones, o por usuarios desarrolladores."
          - "Por defecto, funciones, clases y métodos sin prefijo '_' se consideran públicos."
          - "También se consideran públicos los símbolos exportados explícitamente, usados como puntos de entrada o referenciados por la pipeline principal."
        documentation_requirements:
          - "Todo símbolo público nuevo o modificado debe quedar documentado."
          - "Cada clase pública debe tener su propia entrada de referencia."
          - "Cada función pública debe quedar documentada en la referencia del módulo o en una entrada propia si su complejidad lo justifica."
          - "Cada método público relevante debe documentarse dentro de la entrada de su clase."
        target_paths:
          module_reference: "docs/dev/reference/public/modules/"
          class_reference: "docs/dev/reference/public/classes/"
          function_reference: "docs/dev/reference/public/functions/"
      internal:
        definition:
          - "Se considera interno todo símbolo auxiliar, privado o de soporte que no forma parte de la interfaz esperada para otros consumidores."
          - "Por defecto, funciones, clases y métodos con prefijo '_' se consideran internos."
          - "También se consideran internos helpers, adaptadores locales y utilidades usadas solo dentro del módulo."
        documentation_requirements:
          - "Todo símbolo interno nuevo o modificado debe evaluarse para documentación."
          - "Los símbolos internos importantes para mantenimiento, depuración o arquitectura deben documentarse."
          - "Los símbolos internos triviales o autoexplicativos pueden resumirse en una sección agrupada, no necesariamente en un archivo individual."
          - "Las decisiones internas con impacto arquitectónico deben aparecer además en explanation/."
        target_paths:
          module_reference: "docs/dev/reference/internal/modules/"
          class_reference: "docs/dev/reference/internal/classes/"
          function_reference: "docs/dev/reference/internal/functions/"

  user:
    path: docs/user/
    profile: "Usuario final. Sin jerga técnica. Orientado a lo que puede hacer."
    sections:
      tutorials:  "Onboarding. Primera experiencia con el producto."
      how-to:     "Cómo completar una tarea específica."
      reference:  "Glosario y términos del dominio."
      explanation: "Cómo funciona algo del producto, sin tecnicismos."

decision_rules:
  - "Si el cambio es refactor interno sin cambio de comportamiento → no documentar"
  - "Si cambia una firma, endpoint o configuración → actualizar reference/ de dev"
  - "Si se agrega una feature visible → actualizar how-to/ de ambas audiencias"
  - "Si cambia arquitectura → actualizar explanation/ de dev"
  - "Documentar exhaustivamente todos los símbolos públicos nuevos o modificados en docs/dev/reference/public/"
  - "Documentar los símbolos internos nuevos o modificados cuando sean relevantes para mantenimiento, depuración, operación o arquitectura, usando docs/dev/reference/internal/"
  - "Separar siempre la documentación técnica de símbolos públicos e internos"
  - "Crear una entrada de referencia por clase pública nueva o modificada"
  - "Crear o actualizar documentación de funciones públicas nuevas o modificadas, aunque no tengan clase asociada"
  - "Si un módulo contiene varios símbolos internos menores, se permite una única página de referencia interna agrupada por módulo"
  - "Actualizar solo las secciones afectadas cuando ya existan, pero crear nuevas entradas por símbolo cuando falten"
  - "Si el archivo no existe → crearlo. Nombre en kebab-case descriptivo de la acción o concepto"
  - "Si se crea un archivo nuevo → actualizar el README.md índice de esa audiencia"
  - "Si se crea o actualiza documentación de símbolos, actualizar los README.md índice para distinguir explícitamente entre public e internal"
  - "No omitir un símbolo público nuevo o modificado por razones de brevedad si hay contexto suficiente para describirlo"
  - "Toda documentación creada debe ser compatible con navegación en un generador de sitios estáticos"
  - "Toda carpeta estructural debe tener una página índice navegable"
  - "Todo documento nuevo debe incluir frontmatter mínimo para integrarse en sidebars"
  - "Cuando se creen varias páginas hermanas, asignar sidebar_position de forma consistente"
  - "Toda la documentación humana debe escribirse en español"
  - "La home global de docs y los indices de carpetas deben mantenerse actualizados conforme cambie la documentación"

naming:
  dev: "reference/public/modules → module-name.md | reference/public/classes → class-name.md | reference/public/functions → function-name.md | reference/internal/modules → module-name.md | reference/internal/classes → class-name.md | reference/internal/functions → function-name.md | how-to → how-to-verb-noun.md | explanation → concept.md | landing pages → index.md"
  user: "how-to → how-to-verb-noun.md | explanation → concept.md"

reference_templates:
  dev:
    public_class:
      frontmatter:
        title: "Human readable class name"
        description: "Short summary of the class responsibility"
        sidebar_position: 1
      required_sections:
        - "Overview"
        - "Constructor"
        - "Public Methods"
        - "Parameters"
        - "Returns"
        - "Raised Errors"
        - "Usage Example"
        - "Related Symbols"
    public_function:
      frontmatter:
        title: "Human readable function name"
        description: "Short summary of the function purpose"
        sidebar_position: 1
      required_sections:
        - "Overview"
        - "Signature"
        - "Parameters"
        - "Returns"
        - "Raised Errors"
        - "Usage Example"
        - "Related Symbols"
    internal_symbol:
      frontmatter:
        title: "Human readable internal symbol name"
        description: "Short summary of the internal symbol purpose"
        sidebar_position: 1
      required_sections:
        - "Purpose"
        - "Internal Flow"
        - "Inputs and Outputs"
        - "Side Effects"
        - "Maintenance Notes"
        - "Related Symbols"
    landing_page:
      frontmatter:
        title: "Section title"
        description: "Landing page summary for this documentation category"
        sidebar_position: 1
      required_sections:
        - "Overview"
        - "Contents"
        - "When to Read This Section"

indexing_rules:
  dev:
    readme_structure:
      - "Public Reference"
      - "Internal Reference"
      - "How-to"
      - "Explanation"
    requirements:
      - "Todo README.md de dev debe separar enlaces a símbolos públicos e internos"
      - "Los archivos nuevos deben añadirse a la sección correcta del índice"
      - "Los índices deben actuar como landing pages aptas para Docusaurus"
      - "Las carpetas reference/public, reference/internal, how-to y explanation deben tener index.md"

site_structure:
  dev:
    root: "docs/dev/"
    required_paths:
      - "docs/dev/index.md"
      - "docs/dev/reference/index.md"
      - "docs/dev/reference/public/index.md"
      - "docs/dev/reference/public/modules/index.md"
      - "docs/dev/reference/public/classes/index.md"
      - "docs/dev/reference/public/functions/index.md"
      - "docs/dev/reference/internal/index.md"
      - "docs/dev/reference/internal/modules/index.md"
      - "docs/dev/reference/internal/classes/index.md"
      - "docs/dev/reference/internal/functions/index.md"
      - "docs/dev/how-to/index.md"
      - "docs/dev/explanation/index.md"
  user:
    root: "docs/user/"
    required_paths:
      - "docs/user/index.md"
      - "docs/user/tutorials/index.md"
      - "docs/user/how-to/index.md"
      - "docs/user/reference/index.md"
      - "docs/user/explanation/index.md"
