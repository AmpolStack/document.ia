# .github/workflows/docs-pipeline.yml
name: Auto Documentation

on:
  push:
    branches: [master]
    paths: ['src/**']
  workflow_dispatch:

concurrency:
  group: auto-documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache modelo de embeddings
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: embeddings-${{ runner.os }}-MiniLM-L6-v2

      - name: Cache vector store
        uses: actions/cache@v3
        with:
          path: |
            ./vector_store
            ./.doc_pipeline_state.json
          key: chromadb-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            chromadb-${{ runner.os }}-${{ github.ref_name }}-
            chromadb-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Generar documentación
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -m src.generate_docs

      - name: Commit a branch docs/ia
        run: |
          git config user.name "docs-bot"
          git config user.email "docs-bot@github-actions"
          if git ls-remote --exit-code --heads origin docs/ia; then
            git fetch origin docs/ia
            git checkout -B docs/ia origin/docs/ia
          else
            echo "La rama docs/ia no existe aún. Se creará en esta ejecución."
            git checkout -B docs/ia
            git push --set-upstream origin docs/ia
          fi

          git add docs/
          if git diff --staged --quiet; then
            echo "Sin cambios en docs."
            exit 0
          fi

          git commit -m "docs: auto-update desde ${{ github.sha }}"
          git fetch origin docs/ia
          git rebase origin/docs/ia
          git push origin docs/ia
