# .github/workflows/docs-pipeline.yml
name: Auto Documentation

on:
  push:
    branches: [master]
    paths: ['src/**']

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache modelo de embeddings
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: embeddings-${{ runner.os }}-MiniLM-L6-v2

      - name: Cache vector store
        uses: actions/cache@v3
        with:
          path: |
            ./vector_store
            ./.doc_pipeline_state.json
          key: chromadb-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            chromadb-${{ runner.os }}-${{ github.ref_name }}-
            chromadb-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Generar documentación
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python -m src

      - name: Commit a branch docs/ia
        run: |
          git config user.name "docs-bot"
          git config user.email "docs-bot@github-actions"
          git fetch origin docs/ia || true
          git checkout docs/ia 2>/dev/null || git checkout -b docs/ia
          git add docs/
          git diff --staged --quiet && echo "Sin cambios en docs." && exit 0
          git commit -m "docs: auto-update desde ${{ github.sha }}"
          git push origin docs/ia
